<h1>아기 목욕 방법 완벽 가이드 — 신생아부터 영아까지</h1>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content">
<p>신생아를 처음 목욕시키는 일은 많은 초보 부모에게 두려운 경험입니다. 작고 연약한 아기를 물 안에서 잡고 있어야 한다는 긴장감에 손이 떨리기도 합니다. 하지만 올바른 방법을 알고 나면 목욕은 아기와 부모 모두에게 즐거운 시간이 됩니다. 단계별로 차근차근 알아봅니다.</p>

<h2>탯줄이 붙어 있을 때 — 스펀지 목욕</h2>
<p>탯줄이 완전히 떨어지기 전(보통 생후 1~3주)까지는 탯줄을 물에 담그면 안 됩니다. 이 시기에는 <strong>스펀지 목욕</strong>을 합니다. 따뜻하고 바람이 없는 곳에서 아기를 타올 위에 눕히고, 한 부위씩 닦으면서 나머지 부위는 타올로 덮어 체온을 유지합니다. 눈, 귀 주변, 목 주름, 겨드랑이, 기저귀 부위 순으로 닦습니다. 탯줄 부위는 물에 적신 거즈로 부드럽게 닦고 완전히 건조합니다.</p>

<h2>통목욕 시작 시기</h2>
<p>탯줄이 완전히 떨어지고 배꼽 부위가 아문 후 통목욕을 시작할 수 있습니다. 남아의 경우 포경수술을 했다면 수술 부위가 완전히 아문 후 시작합니다. 탯줄은 보통 생후 7~21일 사이에 떨어집니다.</p>

<h2>목욕 온도와 환경</h2>
<p>욕조 물 온도는 <strong>37~38°C</strong>가 적당합니다. 손목 안쪽이나 팔꿈치 안쪽에 대보아 따뜻하게 느껴지면 됩니다. 욕탕 온도계를 사용하면 더 정확합니다. 실내 온도는 24~26°C로 따뜻하게 유지합니다. 욕조에 물은 5~8cm 깊이면 충분합니다. 아기를 욕조에 혼자 절대 두지 않습니다 — 전화가 오거나 문이 벨이 울려도 아기를 먼저 안전하게 꺼낸 후 이동합니다.</p>

<h2>아기 목욕 순서</h2>
<div class="info-box">
<h3>🛁 아기 목욕 단계별 순서</h3>
<ul>
<li><strong>1단계 — 얼굴:</strong> 물에 적신 부드러운 거즈나 면봉으로 눈(바깥쪽→안쪽), 귀 주변, 코 주변을 닦습니다. 귀 안쪽은 면봉을 깊이 넣지 않습니다.</li>
<li><strong>2단계 — 머리:</strong> 아기를 안은 상태에서 물을 끼얹거나 거즈로 머리를 닦습니다. 영아용 샴푸를 소량 사용합니다. 천문(숨구멍) 위도 부드럽게 닦아도 됩니다.</li>
<li><strong>3단계 — 몸통:</strong> 욕조에 천천히 넣으며 목욕시킵니다. 목 주름, 겨드랑이, 손가락 사이, 사타구니 주름을 꼼꼼히 닦습니다.</li>
<li><strong>4단계 — 등:</strong> 아기 가슴을 지지하며 엎드린 자세로 등을 닦습니다. 또는 한 손으로 지지하고 등을 닦습니다.</li>
<li><strong>5단계 — 기저귀 부위:</strong> 마지막에 기저귀 부위를 닦습니다. 여아는 앞에서 뒤로 닦아 요도 감염을 예방합니다.</li>
</ul>
</div>

<h2>목욕 횟수</h2>
<p>신생아는 매일 목욕이 필수는 아닙니다. <strong>주 2~3회</strong>로도 충분합니다. 다만 기저귀 부위와 목 주름, 겨드랑이 등 피부 접힘 부위는 매일 닦아줍니다. 아토피성 피부염이 있는 아기는 매일 짧게(10분 이내) 목욕 후 즉시 보습제를 발라주는 것이 오히려 도움이 됩니다.</p>

<h2>목욕 후 보습의 중요성</h2>
<p>아기 피부는 성인보다 수분 증발이 빨라 목욕 후 빠르게 건조해집니다. 목욕 후 <strong>3분 이내</strong>에 물기를 가볍게 두드려 닦고(문지르지 않습니다) 보습제를 바릅니다. 로션보다는 크림이나 연고 타입이 보습력이 강합니다. 향료, 알코올이 없는 아기 전용 보습제를 선택합니다.</p>

<h2>목욕을 무서워하는 아기</h2>
<p>일부 아기는 물에 들어가는 것을 무서워합니다. 억지로 강요하면 더 심해질 수 있습니다. 욕조 대신 세면대나 얕은 대야를 사용해보거나, 엄마나 아빠가 함께 큰 욕조에 들어가 아기를 안아주는 방법도 있습니다. 목욕 장난감을 도입해 즐거운 시간으로 만들어줍니다.</p>

<div class="faq-section">
<details class="faq-item"><summary>아기 귀에 물이 들어갔어요, 어떻게 해야 하나요?</summary><div class="faq-answer"><p>아기 귀는 성인처럼 외이도가 발달해 있어 목욕 중 물이 약간 들어가도 대부분 자연적으로 나옵니다. 목욕 후 아기를 한쪽으로 기울여 물이 빠지게 하거나, 귀 주변을 부드럽게 닦아줍니다. 면봉을 귀 안으로 깊이 넣으면 오히려 귀지를 안쪽으로 밀어 넣거나 귀 안쪽을 자극할 수 있으므로 주의합니다.</p></div></details>
<details class="faq-item"><summary>아기용 샴푸와 바디워시는 꼭 써야 하나요?</summary><div class="faq-answer"><p>필수는 아닙니다. 초기에는 물로만 씻겨도 됩니다. 사용한다면 향료·파라벤·황산염이 없는 아기 전용 제품을 선택하고 소량만 사용합니다. 눈물이 안 나는(No-tears) 제품이 안전합니다.</p></div></details>
</div>
