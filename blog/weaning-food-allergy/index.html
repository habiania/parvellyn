<h1>이유식 식품 알레르기 — 원인·증상·대처법 완벽 정리</h1>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content">
<p>이유식을 시작하면 부모들이 가장 걱정하는 것 중 하나가 식품 알레르기입니다. 아기에게 새로운 식재료를 줄 때마다 혹시 반응이 나타나지 않을까 긴장하게 됩니다. 어떤 식품이 알레르기를 유발하기 쉬운지, 증상이 나타나면 어떻게 대처해야 하는지 자세히 알아봅니다.</p>

<h2>식품 알레르기의 원인</h2>
<p>식품 알레르기는 특정 식품의 단백질을 면역계가 위험 물질로 잘못 인식해 과잉 반응을 일으키는 것입니다. 영아기에는 아직 장 점막과 면역계가 완전히 성숙하지 않아 알레르기 반응이 더 쉽게 나타날 수 있습니다. 가족 중 알레르기(음식 알레르기, 아토피, 천식, 비염)가 있으면 아기에게도 나타날 확률이 높습니다.</p>

<h2>주요 알레르기 유발 식품 (8대 알레르겐)</h2>
<div class="info-box">
<h3>⚠️ 이유식에서 주의해야 할 주요 알레르겐</h3>
<ul>
<li><strong>달걀:</strong> 특히 흰자. 노른자보다 흰자 알레르기가 흔합니다. 완전히 익혀서 줍니다.</li>
<li><strong>우유·유제품:</strong> 카세인, 유청 단백질이 원인. 만 1세 이후 생우유 도입 시 주의.</li>
<li><strong>땅콩:</strong> 심한 알레르기 반응을 유발할 수 있습니다. 견과류 페이스트 형태로 소량 도입.</li>
<li><strong>견과류 (호두, 캐슈 등):</strong> 아기에게 통견과는 질식 위험. 페이스트나 분말로만.</li>
<li><strong>밀 (글루텐):</strong> 글루텐 과민증과 구별 필요. 쌀 이유식에 익숙해진 후 도입.</li>
<li><strong>대두(콩):</strong> 두부는 이유식 단백질원으로 자주 사용되므로 첫 도입 시 주의.</li>
<li><strong>새우·게 등 갑각류:</strong> 주로 후기 이유식에 도입. 완전히 익혀서 줍니다.</li>
<li><strong>생선:</strong> 흰살생선(대구, 광어)부터 시작. 등푸른 생선은 중기 이후 도입.</li>
</ul>
</div>

<h2>알레르기 반응 증상</h2>
<p><strong>피부 반응:</strong> 두드러기(벌레 물린 것처럼 부풀어 오르는 붉은 반점), 습진 악화, 입 주변 붓기. 가장 흔한 반응입니다.</p>
<p><strong>소화기 반응:</strong> 구토, 설사, 복통. 새 식재료를 준 후 수시간~24시간 이내에 나타납니다.</p>
<p><strong>호흡기 반응:</strong> 콧물, 재채기, 기침. 심한 경우 호흡 곤란이 올 수 있습니다.</p>
<p><strong>아나필락시스(응급):</strong> 여러 장기에 동시에 심한 반응이 나타나는 생명을 위협하는 상태입니다. 갑작스러운 호흡 곤란, 얼굴 전체 부종, 극도의 보챔, 창백해짐, 의식 저하가 나타나면 즉시 119를 불러야 합니다.</p>

<h2>새 식재료 도입 원칙 — 4일 규칙</h2>
<p>식품 알레르기를 파악하려면 새 재료를 <strong>하나씩, 최소 4일 간격</strong>으로 도입해야 합니다. 4일 동안 같은 재료를 주면서 반응을 관찰합니다. 여러 재료를 동시에 도입하면 알레르기가 나타났을 때 원인 식품을 특정할 수 없습니다.</p>
<p>알레르기 고위험 식품(달걀, 땅콩, 견과류, 생선, 갑각류 등)은 최초 도입 시 소량으로 시작합니다. 반응이 없으면 점진적으로 양을 늘립니다. 알레르기 고위험 가족력이 있다면 소아과 의사와 상담 후 도입 계획을 세우세요.</p>

<h2>알레르기 반응 시 대처법</h2>
<p>경미한 반응(입 주변 붉어짐, 약한 두드러기)이 나타나면 해당 식품을 즉시 중단하고, 반응이 사라질 때까지 관찰합니다. 소아과에 연락해 상황을 알립니다. 중등도 반응(전신 두드러기, 구토, 호흡 불편)은 즉시 소아과 또는 응급실을 방문합니다. 아나필락시스 증상(호흡 곤란, 의식 저하)은 즉시 119에 신고합니다.</p>

<h2>알레르기 예방을 위한 조기 도입</h2>
<p>과거에는 알레르기 유발 식품 도입을 최대한 늦추라고 권고했습니다. 그러나 최신 연구(LEAP 연구 등)는 오히려 <strong>생후 4~6개월에 조기 도입하는 것이 알레르기 예방에 더 효과적</strong>이라는 것을 보여줍니다. 특히 땅콩 알레르기의 경우 조기 도입 군에서 알레르기 발생률이 크게 낮았습니다. 가족력이 없다면 적극적으로 다양한 식재료를 도입하는 것이 권장됩니다.</p>

<div class="faq-section">
<details class="faq-item"><summary>아토피가 있는 아기도 이유식 알레르기 식품을 먹어도 되나요?</summary><div class="faq-answer"><p>아토피가 있는 아기는 오히려 더 일찍 알레르기 식품을 도입해야 한다는 연구 결과가 있습니다. 단, 아토피가 심한 경우 소아과 또는 소아 알레르기 전문의의 지도하에 도입하는 것이 안전합니다.</p></div></details>
<details class="faq-item"><summary>알레르기가 나타난 식품은 영영 못 먹는 건가요?</summary><div class="faq-answer"><p>달걀, 우유, 밀 알레르기는 성장하면서 자연 소실되는 경우가 많습니다(약 80%). 땅콩, 견과류, 해산물 알레르기는 지속되는 경향이 있습니다. 주기적으로 소아 알레르기 전문의와 재평가하면서 재도입 여부를 결정합니다.</p></div></details>
</div>
