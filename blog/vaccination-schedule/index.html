<h1>아기 예방접종 스케줄 완벽 정리 — 시기·종류·주의사항</h1>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content">
<p>예방접종은 아기를 감염병으로부터 보호하는 가장 효과적인 방법입니다. 한국에서는 국가에서 무료로 지원하는 <strong>국가필수예방접종(NIP)</strong>이 있으며, 부모가 선택적으로 추가할 수 있는 기타 백신도 있습니다. 처음 아이를 키우는 부모라면 언제 어떤 주사를 맞혀야 하는지 복잡하게 느껴질 수 있습니다. 이 글에서 태어나서 돌까지의 전체 예방접종 일정을 한눈에 정리해드립니다.</p>

<h2>예방접종이 중요한 이유</h2>
<p>신생아는 태어날 때 엄마로부터 일부 항체를 받지만, 이 항체는 생후 6개월이 지나면 대부분 소실됩니다. 즉, 생후 6개월~만 2세 사이의 아기는 감염병에 가장 취약한 시기를 보냅니다. 예방접종은 아기 스스로 항체를 만들도록 유도해 이 취약한 시기를 안전하게 넘기도록 돕습니다.</p>
<p>또한 예방접종은 개인을 보호할 뿐 아니라 <strong>집단면역(herd immunity)</strong>을 형성해 아직 접종받지 못한 신생아나 면역저하자를 지역사회 전체가 보호하는 역할을 합니다. 예방접종률이 높을수록 지역사회 내 감염병 유행 위험이 줄어듭니다.</p>

<h2>월령별 국가필수예방접종 스케줄</h2>
<div class="info-box">
<h3>📅 출생 직후 (0~1개월)</h3>
<ul>
<li><strong>B형 간염(HepB) 1차:</strong> 출생 후 12시간 이내 접종. B형 간염은 엄마로부터 수직 감염될 수 있어 출생 직후 접종이 매우 중요합니다.</li>
<li><strong>BCG (결핵):</strong> 생후 4주 이내 접종 권장. 피내 접종(피부 내)과 경피 접종(도장 모양) 두 종류가 있으며, 의료기관에 따라 방식이 다릅니다.</li>
</ul>
</div>
<div class="info-box">
<h3>📅 생후 1개월</h3>
<ul>
<li><strong>B형 간염(HepB) 2차:</strong> 1차 접종 후 1개월째 맞는 2차 접종입니다.</li>
</ul>
</div>
<div class="info-box">
<h3>📅 생후 2개월</h3>
<ul>
<li><strong>DTaP 1차:</strong> 디프테리아·파상풍·백일해 혼합백신</li>
<li><strong>IPV 1차:</strong> 폴리오(소아마비) 백신</li>
<li><strong>Hib 1차:</strong> b형 헤모필루스 인플루엔자 백신</li>
<li><strong>PCV 1차:</strong> 폐렴구균 백신</li>
<li><strong>로타바이러스 1차:</strong> 경구 투여(먹는 백신). 로타텍(3회) 또는 로타릭스(2회) 제품에 따라 접종 횟수가 다릅니다.</li>
</ul>
</div>
<div class="info-box">
<h3>📅 생후 4개월</h3>
<ul>
<li><strong>DTaP 2차, IPV 2차, Hib 2차, PCV 2차</strong></li>
<li><strong>로타바이러스 2차</strong></li>
</ul>
</div>
<div class="info-box">
<h3>📅 생후 6개월</h3>
<ul>
<li><strong>DTaP 3차, IPV 3차, Hib 3차</strong></li>
<li><strong>B형 간염(HepB) 3차:</strong> 이 접종으로 기본 B형 간염 시리즈가 완성됩니다.</li>
<li><strong>PCV 3차</strong></li>
<li><strong>로타바이러스 3차</strong> (로타텍 제품만 해당)</li>
<li><strong>인플루엔자:</strong> 생후 6개월 이상부터 매년 독감 시즌 전 접종 권장</li>
</ul>
</div>
<div class="info-box">
<h3>📅 생후 12~15개월</h3>
<ul>
<li><strong>MMR 1차:</strong> 홍역·유행성이하선염·풍진 혼합백신</li>
<li><strong>수두 1차</strong></li>
<li><strong>PCV 4차</strong> (생후 12~15개월)</li>
<li><strong>Hib 4차</strong> (생후 12~15개월)</li>
<li><strong>일본뇌염:</strong> 사백신 1~2차 또는 생백신 1차</li>
<li><strong>A형 간염 1차</strong> (생후 12개월 이후)</li>
</ul>
</div>
<div class="info-box">
<h3>📅 생후 15~18개월</h3>
<ul>
<li><strong>DTaP 4차</strong></li>
</ul>
</div>

<h2>국가필수접종 vs 기타 권장 백신</h2>
<p>국가필수예방접종은 보건소 및 지정 의료기관에서 무료로 접종받을 수 있습니다. 아래 백신들은 국가 지원은 없지만 소아과에서 추가로 권장하는 백신입니다.</p>
<ul>
<li><strong>로타바이러스:</strong> 2023년부터 국가필수접종으로 전환되어 무료 접종 가능</li>
<li><strong>수막구균(MCV):</strong> 뇌수막염 예방. 특히 탁아소, 어린이집 등 단체 생활하는 아기에게 권장</li>
<li><strong>독감(인플루엔자):</strong> 국가지원 대상이지만 매년 갱신이 필요</li>
</ul>

<h2>예방접종 전 확인사항</h2>
<p>접종 당일 아기의 체온을 확인합니다. <strong>37.5°C 이상의 열이 있으면 접종을 연기</strong>합니다. 콧물이나 기침만 있는 경미한 감기는 접종 가능한 경우가 많지만, 의사와 상담 후 결정합니다. 이전 접종에서 심한 이상 반응(알레르기, 고열, 경련 등)이 있었다면 반드시 사전에 알려야 합니다. 모유수유 중인 경우 접종 전후 모유수유를 지속해도 무방합니다.</p>

<h2>접종 후 이상반응과 대처법</h2>
<p>예방접종 후 흔히 나타나는 반응은 대부분 정상적인 면역 반응입니다. <strong>접종 부위 발적·부종·통증</strong>은 가장 흔한 반응으로, 차가운 수건을 접종 부위에 대주면 완화됩니다. <strong>미열(38°C 미만)</strong>은 1~2일 내 자연 해소됩니다. <strong>보채거나 잠을 많이 자는 것</strong>도 정상 반응입니다.</p>
<p>다음 증상이 나타나면 즉시 응급실을 방문해야 합니다: 39°C 이상의 고열이 2일 이상 지속, 심한 울음이 3시간 이상 지속, 경련 발생, 접종 부위가 심하게 붓거나 화농, 아나필락시스 반응(두드러기, 호흡 곤란, 얼굴 부종).</p>

<h2>예방접종 기록 관리하는 법</h2>
<p>예방접종 기록은 <strong>질병관리청 예방접종도우미 앱</strong>이나 <strong>정부24 홈페이지</strong>에서 확인할 수 있습니다. 앱에서는 다음 접종 일정 알림 기능도 제공하므로 설치해두면 편리합니다. 예방접종 수첩도 잃어버리지 않도록 잘 보관하세요. 어린이집·유치원 입학 시 제출 서류로 필요합니다.</p>

<div class="faq-section">
<details class="faq-item"><summary>예방접종을 늦게 맞혀도 괜찮나요?</summary><div class="faq-answer"><p>가능하면 권장 일정에 맞추는 것이 좋지만, 아기가 아프거나 부득이한 사정이 있다면 접종을 미룰 수 있습니다. 단, 너무 오래 미루면 감염 위험 기간이 길어지므로 소아과와 상의해 보충 일정을 잡으세요.</p></div></details>
<details class="faq-item"><summary>여러 백신을 같은 날 맞혀도 되나요?</summary><div class="faq-answer"><p>네, 가능합니다. 현재 국가 예방접종 일정은 같은 날 여러 백신을 동시에 접종하도록 설계되어 있습니다. 동시 접종이 면역 효과를 떨어뜨리지 않으며 오히려 병원 방문 횟수를 줄여 편리합니다.</p></div></details>
<details class="faq-item"><summary>BCG 접종 후 흉터가 남나요?</summary><div class="faq-answer"><p>피내 접종의 경우 접종 부위(왼쪽 팔 상단)에 작은 흉터가 생기는 것이 정상입니다. 이는 백신이 효과를 발휘한 증거이며 걱정하지 않아도 됩니다. 경피 접종(도장 모양)은 흉터 크기가 다를 수 있습니다.</p></div></details>
<details class="faq-item"><summary>독감 예방접종은 매년 해야 하나요?</summary><div class="faq-answer"><p>네, 독감 바이러스는 매년 변이하기 때문에 매년 새로운 백신을 접종해야 합니다. 생후 6개월~만 9세 아동은 첫 해에 2회(4주 간격) 접종이 필요합니다. 이후부터는 매년 1회 접종합니다.</p></div></details>
</div>
