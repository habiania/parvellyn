<h1>이유식 첫 식재료 선택 가이드 — 무엇부터 시작할까</h1>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content"><p>이유식을 처음 시작할 때 가장 많이 받는 질문 중 하나가 "무엇부터 먹여야 하나요?"입니다. 첫 이유식 식재료는 소화하기 쉽고, 알레르기 반응을 일으킬 위험이 낮으며, 아기가 거부감 없이 받아들일 수 있는 것이어야 합니다.</p>
<h2>첫 이유식에 적합한 식재료</h2>
<h3>곡류 — 쌀미음부터 시작</h3>
<p>대부분의 이유식 가이드라인은 쌀 미음(쌀가루 또는 불린 쌀로 만든 10배죽)을 첫 이유식으로 권장합니다. 쌀은 알레르기 반응이 매우 드물고, 소화가 잘 되며, 특별한 맛이 없어 새로운 음식에 대한 거부감을 줄입니다. 오트밀도 좋은 대안입니다.</p>
<h3>채소류</h3>
<p>달콤한 맛의 채소부터 시작하면 거부감이 적습니다. 단호박, 당근, 고구마, 브로콜리, 완두콩 순서로 도전해 보세요. 채소는 삶아서 완전히 갈아 매끄러운 퓨레 형태로 만듭니다.</p>
<h3>과일류</h3>
<p>사과, 배, 바나나는 달콤하고 소화가 쉬어 초기 이유식에 적합합니다. 감귤류(오렌지, 레몬 등)와 딸기는 산도가 높아 6개월 이상부터 도입하는 것이 좋습니다.</p>
<h3>단백질 식품 (7개월 이후부터)</h3>
<p>소고기, 닭고기, 두부, 달걀노른자를 순서대로 도입합니다. 생선은 8~9개월 이후, 달걀 흰자는 1세 이후에 도입합니다.</p>
<div class="info-box">
<h3>🚫 1세 미만 아기에게 금지되는 식품</h3>
<ul>
<li><strong>꿀:</strong> 보툴리눔 독소 위험 (1세 이상부터 가능)</li>
<li><strong>소금·설탕·간장:</strong> 신장에 부담, 단맛 의존성 형성</li>
<li><strong>생우유:</strong> 철분 흡수를 방해 (모유·분유 대체 불가)</li>
<li><strong>견과류 통째:</strong> 질식 위험 (다진 형태도 1세 이후)</li>
<li><strong>생선회·날고기:</strong> 식중독 위험</li>
<li><strong>카페인(커피·홍차·초콜릿):</strong> 신경계 자극</li>
</ul>
</div>
<h2>알레르기 주의 식품 도입 방법</h2>
<p>땅콩, 달걀, 우유, 밀, 생선, 조개류, 콩, 견과류는 알레르기를 일으킬 가능성이 높은 8대 주요 알레르기 원인 식품입니다. 과거에는 늦게 도입하도록 권고했지만, 최근 연구에서는 오히려 적절한 시기에 도입하는 것이 알레르기 예방에 도움이 될 수 있다는 결과가 나오고 있습니다.</p>
<p>새 식재료 도입 규칙: 한 번에 한 가지 식재료만 도입 → 3~5일 간격 유지 → 알레르기 반응(두드러기, 구토, 설사, 호흡곤란) 관찰 → 이상 없으면 다음 식재료 도입.</p>
<h2>이유식 도입 순서 예시 (6개월 시작 기준)</h2>
<p><strong>1~2주:</strong> 쌀 미음<br>
<strong>3~4주:</strong> 단호박 → 당근 → 고구마<br>
<strong>2개월 차:</strong> 브로콜리 → 사과 → 배<br>
<strong>3개월 차:</strong> 소고기 → 닭고기 → 두부<br>
<strong>4개월 차:</strong> 달걀노른자 → 생선(흰살)→ 오트밀</p>

<h2>이유식 첫 식재료 도입 실전 일정표</h2>
<p>이론적인 내용을 실제로 어떻게 적용할지 일정으로 정리합니다. 아래는 6개월부터 시작하는 예시 일정입니다.</p>
<div class="info-box">
<h3>📅 이유식 초기 4주 도입 예시</h3>
<ul>
<li><strong>1주차:</strong> 쌀미음 (4일간 단독으로)</li>
<li><strong>2주차:</strong> 쌀미음 + 단호박 퓨레 (4일간), 이후 애호박 (4일간)</li>
<li><strong>3주차:</strong> 브로콜리 (4일간), 이후 당근 (4일간)</li>
<li><strong>4주차:</strong> 청경채 (4일간), 이후 두부 (4일간)</li>
</ul>
</div>
<p>이 일정은 참고용이며, 아기의 반응에 따라 조절합니다. 알레르기 반응(두드러기, 구토, 심한 보챔)이 나타나면 해당 식재료를 중단하고 소아과에 상담합니다.</p>
<h2>식재료 조리 시 주의사항</h2>
<p><strong>완전히 익히기:</strong> 이유식 재료는 날 것 상태로 주지 않습니다. 채소는 부드럽게 익혀 갈아야 소화가 잘 됩니다. 달걀은 완전히 익혀야 살모넬라균 감염을 예방합니다.</p>
<p><strong>간 하지 않기:</strong> 소금, 간장, 설탕 등 조미료는 만 1세까지 사용하지 않습니다. 신장이 염분을 처리하기 어렵고, 이른 단맛 노출은 편식의 원인이 됩니다.</p>
<p><strong>꿀 절대 금지:</strong> 만 1세 미만 아기에게 꿀은 보툴리누스균 감염 위험이 있어 절대 주지 않습니다. 꿀이 들어간 가공식품도 확인하세요.</p>
<p><strong>생선 관리:</strong> 흰살생선은 중기(7~8개월)부터 도입합니다. 구매 후 즉시 조리하거나, 조리 전까지 냉장 보관합니다. 가시를 꼼꼼히 제거합니다.
<div class="faq-section">
<details class="faq-item"><summary>이유식은 꼭 쌀미음부터 시작해야 하나요?</summary><div class="faq-answer"><p>반드시 쌀미음으로 시작할 필요는 없습니다. 단호박 퓨레나 고구마 퓨레로 시작하는 경우도 많습니다. 중요한 것은 알레르기 반응을 확인하기 위해 새 식재료를 하나씩 도입하는 것입니다.</p></div></details>
<details class="faq-item"><summary>달걀 알레르기가 걱정되는데 언제 먹여야 하나요?</summary><div class="faq-answer"><p>달걀노른자는 7개월 이후 잘 익힌 형태로 먼저 도입합니다. 달걀 흰자(알레르기 원인 단백질이 많음)는 1세 이후에 도입하는 것이 일반적입니다. 가족 중 달걀 알레르기가 있다면 소아과 의사와 상담 후 도입합니다.</p></div></details>
