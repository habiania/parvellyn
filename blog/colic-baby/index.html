<h1>영아 산통(콜릭) 원인과 달래는 방법</h1>
<p class="post-excerpt">하루 3시간 이상, 주 3일 이상 이유 없이 우는 아기, 산통일 수 있습니다. 올바른 대처법을 알아보세요.</p>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content">
<p>영아 산통(콜릭)은 건강한 아기가 뚜렷한 이유 없이 하루 3시간 이상, 일주일에 3일 이상, 3주 이상 지속적으로 울음을 터뜨리는 현상입니다. 보통 생후 2~3주에 시작해 3~4개월이 되면 자연스럽게 사라집니다. 부모 입장에서 무척 힘든 시기지만, 영아 산통은 아기에게 위험한 것이 아니며 성장하면서 해결됩니다.</p>

<h2>영아 산통의 특징</h2>
<p>산통으로 우는 아기는 얼굴이 붉어지고, 두 주먹을 꽉 쥐며, 다리를 배 쪽으로 끌어당기거나 발버둥치는 특징이 있습니다. 주로 저녁 시간대(오후 6시~자정)에 집중적으로 울음이 심해집니다. 수유, 기저귀, 트림 등 일반적인 원인을 모두 해소해도 울음이 멈추지 않습니다.</p>

<h2>영아 산통의 원인 (추정)</h2>
<p>정확한 원인은 아직 밝혀지지 않았지만 여러 이론이 있습니다. 장내 가스가 쌓여 복통을 유발한다는 가스 이론, 미숙한 소화 기관으로 인한 장운동 문제, 과도한 자극에 대한 신경계 반응, 모유수유 시 엄마의 식단(카페인, 유제품, 십자화과 채소 등)의 영향 등이 제시되고 있습니다.</p>

<h2>집에서 해볼 수 있는 달래기 방법</h2>
<p><strong>배 마사지와 자전거 발 운동:</strong> 아기를 눕히고 배꼽 주위를 시계 방향으로 부드럽게 마사지합니다. 다리를 자전거 페달처럼 교대로 움직여 장내 가스 배출을 도울 수 있습니다.</p>
<p><strong>배를 아래로 안아주기:</strong> 아기를 팔 위에 엎드려 뉘인 채로 가볍게 흔들어 주는 자세가 효과적일 수 있습니다. 배에 따뜻한 압력이 가해져 불편함이 줄어들 수 있습니다.</p>
<p><strong>하얀 소음(화이트 노이즈):</strong> 진공청소기 소리, 선풍기 소리, 빗소리 등 반복되는 소음이 아기를 진정시키는 효과가 있습니다. 스마트폰 앱이나 화이트노이즈 기기를 활용할 수 있습니다.</p>
<p><strong>스왜들링(포대기 싸기):</strong> 아기를 담요로 단단히 감싸면 자궁 속 환경과 비슷한 안정감을 줄 수 있습니다. 단, 너무 꽉 조이지 않도록 합니다.</p>
<p><strong>수유 방법 개선:</strong> 수유 중 공기 삼킴을 줄이기 위해 수유 각도를 조정하고, 수유 중간과 후에 충분히 트림을 시킵니다.</p>

<div class="info-box">
<h3>⚠️ 병원에 가야 할 신호</h3>
<ul>
<li>체온 38°C 이상의 발열이 동반될 때</li>
<li>구토가 심하거나 혈변이 있을 때</li>
<li>체중이 줄거나 수유량이 급격히 감소할 때</li>
<li>배가 단단하고 부어 보일 때</li>
<li>울음 양상이 갑자기 변하거나 비명에 가까운 울음일 때</li>
</ul>
</div>

<h2>부모를 위한 조언</h2>
<p>영아 산통은 부모에게도 매우 힘든 시간입니다. 아기가 울음을 멈추지 않을 때 답답하고 무력감을 느끼는 것은 당연합니다. 중요한 것은, 이 시기가 반드시 지나간다는 것입니다. 파트너와 번갈아 가며 아기를 돌보고, 혼자 너무 오래 지치지 않도록 도움을 요청하세요.</p>


<h2>산통 아기를 달래는 추가 방법</h2>
<p>일반적인 달래기(흔들기, 수유)로도 효과가 없을 때 시도해볼 수 있는 방법들이 있습니다.</p>
<p><strong>화이트 노이즈:</strong> 선풍기 소리, 청소기 소리, 흐르는 물소리 같은 일정한 소음이 자궁 속 소리와 비슷해 아기를 진정시킵니다. 화이트 노이즈 앱이나 기기를 활용해보세요.</p>
<p><strong>스와들링(포대기):</strong> 아기를 담요로 단단하게 감싸 자궁 속에 있는 듯한 안정감을 줍니다. 팔을 몸통 옆에 가지런히 하고 단단하지만 혈액 순환을 방해하지 않도록 감쌉니다. 단, 고관절이 자유롭게 움직일 수 있도록 다리 부분은 느슨하게 합니다.</p>
<p><strong>배 마사지:</strong> 따뜻한 손으로 배꼽을 중심으로 시계 방향으로 마사지하면 장 운동을 도와 가스 배출에 효과적입니다. 아기를 무릎에 엎어 놓고 등을 가볍게 두드리는 것도 좋습니다.</p>
<p><strong>차 안에서 드라이브:</strong> 차의 진동과 움직임이 아기를 진정시키는 효과가 있습니다. 많은 부모들이 새벽에 드라이브로 산통 아기를 달랬다고 합니다.</p>
<p><strong>부모 번갈아 돌보기:</strong> 산통 아기를 돌보는 것은 심신이 지치는 일입니다. 한 사람이 혼자 감당하지 말고, 파트너와 번갈아 아기를 돌보세요. 30분 이상 달래도 아기가 진정되지 않으면 안전한 곳에 아기를 눕히고 잠깐 다른 방에서 숨 고르는 것도 괜찮습니다.</p>
<h2>산통은 언제 끝나나요?</h2>
<p>산통은 보통 <strong>생후 3~4개월</strong>이 되면 자연스럽게 사라집니다. 이 시기가 되면 신경계와 소화기계가 발달하면서 과도한 울음이 줄어듭니다. 산통이 심한 시기에는 끝이 없을 것처럼 느껴지지만, 반드시 끝이 있습니다. 그때까지 부부가 서로 도우며 이겨내시기를 응원합니다.
<div class="faq-section">
<details class="faq-item"><summary>영아 산통은 언제까지 지속되나요?</summary><div class="faq-answer"><p>대부분 생후 3~4개월이 되면 자연스럽게 사라집니다. 일부 아기는 6개월까지 지속되기도 합니다.</p></div></details>
<details class="faq-item"><summary>산통약(가스 완화 시럽)이 효과가 있나요?</summary><div class="faq-answer"><p>시중에 판매되는 시메티콘 성분의 가스 완화 시럽은 효과에 대한 연구 결과가 엇갈립니다. 사용 전 소아과 의사와 상의하세요.</p></div></details>
</div>
