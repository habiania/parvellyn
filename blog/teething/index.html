<h1>아기 이앓이(치아 발육) — 시기·증상·대처법</h1>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content"><p>아기가 갑자기 침을 많이 흘리거나, 뭔가를 계속 물려고 하거나, 이유 없이 보채기 시작했다면 이앓이(치아 발육, Teething)가 시작된 것일 수 있습니다. 유치는 보통 생후 6개월 전후에 첫 번째 치아가 나오기 시작합니다.</p>
<h2>유치 발달 순서</h2>
<div class="info-box"><h3>🦷 유치 발달 순서 (평균 시기)</h3><ul><li><strong>아래 앞니 (중절치):</strong> 생후 6~10개월</li><li><strong>위 앞니 (중절치):</strong> 생후 8~12개월</li><li><strong>위아래 측절치:</strong> 생후 9~13개월</li><li><strong>첫 번째 어금니:</strong> 생후 13~19개월</li><li><strong>송곳니:</strong> 생후 16~22개월</li><li><strong>두 번째 어금니:</strong> 생후 23~31개월</li></ul></div>
<p>위 시기는 평균치이므로 개인차가 있습니다. 만 1세까지 치아가 나지 않더라도 소아과나 소아치과에서 확인 후 정상이면 걱정하지 않아도 됩니다.</p>
<h2>이앓이 주요 증상</h2>
<p>이앓이 중인 아기는 다음과 같은 증상을 보입니다. <strong>침 분비 증가:</strong> 잇몸 자극으로 침샘이 활성화됩니다. <strong>잇몸 부어오름·붉어짐:</strong> 치아가 올라오는 부위가 팽창합니다. <strong>물기 행동:</strong> 잇몸에 압력을 가하면 통증이 줄어드는 효과가 있어 뭐든 물려고 합니다. <strong>수면 방해:</strong> 밤에 잇몸 불편함이 심해져 자다가 깨는 경우가 있습니다. <strong>식욕 감소:</strong> 수유나 이유식을 거부하거나 양이 줄 수 있습니다.</p>
<p>단, 이앓이가 직접적으로 고열(38°C 이상), 설사, 구토, 심한 발진을 유발하지는 않습니다. 이런 증상이 나타나면 이앓이가 아니라 다른 원인을 찾아야 합니다.</p>
<h2>이앓이 통증 줄이는 방법</h2>
<p><strong>냉각된 치발기:</strong> 냉장고에 차갑게 식힌 실리콘 치발기가 잇몸을 시원하게 해 통증을 완화합니다. 단, 얼려서 딱딱하게 만들면 잇몸에 손상을 줄 수 있으니 냉장(냉동 아님)만 합니다.</p>
<p><strong>잇몸 마사지:</strong> 깨끗하게 씻은 손가락으로 아기 잇몸을 부드럽게 압박하며 마사지합니다. 젖은 거즈로 닦아주는 것도 좋습니다.</p>
<p><strong>찬 음식:</strong> 이유식을 시작한 아기라면 차게 식힌 요거트, 퓨레 등을 주면 잇몸을 시원하게 해줄 수 있습니다.</p>
<p><strong>주의:</strong> 이앓이용 잇몸 마취 젤(벤조카인 성분)은 영아에게 사용 금지입니다. 메트헤모글로빈혈증을 유발할 수 있어 위험합니다.</p>
<h2>첫 구강 관리</h2>
<p>첫 치아가 나오면 즉시 구강 관리를 시작합니다. 처음에는 부드러운 실리콘 손가락 칫솔이나 거즈로 하루 2회 닦아줍니다. 치약은 불소 함량이 낮은 영아용 치약을 쌀 알갱이 크기만큼만 사용합니다. 만 2세부터는 완두콩 크기의 치약을 사용하고, 30개월 이전에 소아치과 첫 방문을 권장합니다.</p>

<h2>이앓이 중 수면 방해 대처법</h2>
<p>이앓이는 낮보다 밤에 더 불편하게 느껴지는 경향이 있습니다. 낮에는 놀이와 자극으로 통증이 분산되지만, 밤에는 주의를 분산시킬 것이 없어 통증에 더 집중하게 됩니다. 이 시기 수면 퇴행은 이앓이의 직접적인 영향일 수 있습니다.</p>
<p><strong>취침 전 잇몸 마사지:</strong> 잠자리에 들기 전 깨끗한 손가락으로 잇몸을 1~2분 마사지하면 통증이 다소 줄어들어 수면에 도움이 됩니다.</p>
<p><strong>냉각된 치발기:</strong> 냉장 보관한(냉동 아님) 실리콘 치발기를 취침 전에 잠깐 씹게 하면 잇몸 통증이 완화됩니다.</p>
<p><strong>수면 루틴 유지:</strong> 이앓이 기간에도 수면 루틴을 최대한 유지합니다. 루틴이 깨지면 이앓이가 끝난 후에도 수면 패턴을 되찾는 데 시간이 걸립니다.</p>
<h2>유치 관리 — 첫 치아부터 시작하는 구강 습관</h2>
<p>유치는 영구치가 나올 자리를 잡아주고, 발음 발달, 씹기 기능에 중요한 역할을 합니다. 유치라도 충치가 생기면 영구치에도 영향을 줄 수 있으므로 첫 치아부터 관리합니다. 첫 치아가 나오면 실리콘 손가락 칫솔이나 거즈로 하루 2회 닦고, 만 12개월이 되면 불소 함유 영아용 치약을 쌀 한 알 크기만큼 사용합니다. 달콤한 음료(주스, 분유)를 담은 젖병을 물고 자게 하면 젖병 충치(우유병 우식증)가 생길 수 있습니다.
<div class="faq-section">
<details class="faq-item"><summary>이앓이 중 열이 날 수 있나요?</summary><div class="faq-answer"><p>이앓이 자체가 38°C 이상의 열을 유발하지는 않습니다. 미열(37.5°C 정도)이 동반될 수 있지만, 38°C 이상의 열이 나면 다른 원인(감기, 중이염 등)을 의심해야 합니다.</p></div></details>
<details class="faq-item"><summary>치아가 늦게 나오면 문제가 있나요?</summary><div class="faq-answer"><p>만 1세까지 치아가 나지 않는 경우도 있습니다. 만 18개월이 지나도 치아가 나오지 않으면 소아치과에서 X-ray 검사를 받아보는 것이 좋습니다.</p></div></details>
