<h1>이유식 단계별 농도·질감 조절 방법</h1><p class="post-excerpt">이유식의 농도와 질감은 아기 발달에 맞춰 단계적으로 변해야 합니다. 초기부터 완료기까지 체계적 가이드를 제공합니다.</p>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content"><p>이유식은 단순히 새로운 음식을 먹이는 것이 아니라, 아기가 씹는 능력을 발달시키고 다양한 맛과 식감을 경험하는 중요한 과정입니다. 월령에 맞지 않는 질감의 이유식은 소화 불량이나 음식 거부의 원인이 될 수 있습니다.</p>

<h2>이유식 4단계 개요</h2>
<div class="info-box">
<h3>📅 이유식 단계별 시기와 질감</h3>
<ul>
<li><strong>초기 (생후 6~7개월):</strong> 매끄러운 퓨레 형태, 묽은 죽</li>
<li><strong>중기 (생후 7~9개월):</strong> 으깬 형태, 잇몸으로 으깰 수 있는 질감</li>
<li><strong>후기 (생후 9~11개월):</strong> 작게 다진 형태, 무른 밥</li>
<li><strong>완료기 (생후 12~18개월):</strong> 잘게 썬 형태, 어른 식사에 가까운 연한 질감</li>
</ul>
</div>

<h2>초기 이유식 (6~7개월)</h2>
<p>초기 이유식의 목표는 아기가 숟가락과 새로운 맛에 익숙해지는 것입니다. 쌀가루나 불린 쌀로 만든 10배죽을 기본으로 하며, 물처럼 흘러내리는 정도의 묽기가 적당합니다. 채소나 과일은 삶아서 완전히 갈아 체에 걸러 씨앗이나 껍질이 없는 매끄러운 형태로 만듭니다.</p>
<p>새 재료는 한 번에 하나씩, 3~5일 간격으로 도입합니다. 알레르기 반응 확인을 위해 충분한 간격을 두는 것이 중요합니다. 하루 1회, 2~3 스푼부터 시작해 점차 양을 늘립니다.</p>

<h2>중기 이유식 (7~9개월)</h2>
<p>잇몸이 발달하면서 조금 더 단단한 질감을 처리할 수 있게 됩니다. 5배죽(쌀과 물 비율 1:5)으로 만들며, 재료를 완전히 갈기보다 곱게 으깬 형태로 만듭니다. 두부, 달걀노른자, 고기(닭가슴살, 소고기) 등 단백질 식품을 도입하기 시작합니다.</p>
<p>하루 2회로 수유 사이에 먹이며, 한 번에 80~100ml 정도가 목표량입니다. 채소는 입자가 작아도 괜찮지만 씹는 느낌이 약간 남아 있는 정도로 만듭니다.</p>

<h2>후기 이유식 (9~11개월)</h2>
<p>아기가 앞니로 음식을 물고 잇몸으로 으깨는 동작이 가능해집니다. 무른 밥(쌀과 물 비율 1:2~3)을 기본으로 하며, 재료를 3~5mm 크기로 잘게 다집니다. 다양한 식재료를 경험하게 해주고, 손으로 집어 먹는 핑거푸드를 시작해 볼 수 있습니다.</p>

<h2>완료기 이유식 (12~18개월)</h2>
<p>어른 식사와 비슷한 형태로 전환합니다. 단, 짠 음식, 자극적인 음식, 딱딱한 음식(견과류, 날 채소 등)은 피합니다. 간은 염분이 거의 없거나 아주 약하게 하고, 천연 재료의 맛에 익숙해지도록 합니다.</p>

<h2>이유식 질감 조절 실패 시 대처법</h2>
<p>아기가 새로운 질감을 거부할 때는 무리하게 강요하지 않습니다. 이전 단계의 질감으로 돌아갔다가 1~2주 후 다시 시도합니다. 좋아하는 재료에 새로운 재료를 섞어 조금씩 익숙해지도록 합니다.</p>


<h2>이유식 단계별 실패 없는 농도 조절법</h2>
<p>이유식 농도를 잘못 조절하면 아기가 거부하거나 구역질을 하게 됩니다. 각 단계에서 농도를 올리는 실용적인 방법을 알아봅니다.</p>
<p><strong>초기에서 중기로 전환:</strong> 한 번에 농도를 확 올리지 말고 2~3주에 걸쳐 서서히 진하게 합니다. 같은 재료로 농도만 조금씩 올리면 아기가 적응하기 쉽습니다.</p>
<p><strong>입자 크기 올리기:</strong> 완전히 갈아낸 퓨레 → 굵게 간 상태 → 으깬 상태 → 작은 덩어리 순으로 올립니다. 아기가 잘 씹고 삼키면 한 단계 올립니다. 구역질이 나거나 거부하면 이전 단계로 돌아갑니다.</p>
<p><strong>BLW(Baby-Led Weaning, 아기 주도 이유식):</strong> 최근 주목받는 방법으로, 퓨레 없이 처음부터 손가락 음식을 주는 방식입니다. 아기가 스스로 쥐고 먹으며 식감과 조각 음식에 일찍 노출됩니다. 질식 위험을 인지하고, 항상 옆에서 감독하며 진행합니다.</p>
<h2>이유식 거부 시 대처법</h2>
<p>아기가 이유식을 거부하는 것은 흔한 일입니다. 새로운 음식에 익숙해지려면 10~15번 이상 노출이 필요하다는 연구 결과가 있습니다. 한 번 거부했다고 포기하지 말고, 2~3일 후 다시 시도해보세요. 온도를 다르게 하거나(약간 따뜻하게), 다른 재료와 섞거나, 시간대를 바꾸는 것도 도움이 됩니다. 억지로 먹이면 오히려 음식 거부감이 강해질 수 있으니 강요는 금물입니다.
<div class="faq-section">
<details class="faq-item"><summary>이유식 질감이 너무 묽으면 어떻게 되나요?</summary><div class="faq-answer"><p>너무 묽은 이유식은 영양 밀도가 낮아 충분한 에너지를 공급하기 어렵습니다. 월령에 맞는 농도로 점차 진하게 만들어 가는 것이 중요합니다.</p></div></details>
<details class="faq-item"><summary>이유식 후기에 손으로 집어 먹기 시작해도 되나요?</summary><div class="faq-answer"><p>9개월 이후 핑거푸드를 시작하는 것은 소근육 발달과 자립적 식사 능력을 키우는 데 도움이 됩니다. 무른 바나나, 아보카도, 부드럽게 익힌 채소 등이 좋습니다.</p></div></details>
