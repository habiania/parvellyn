<h1>이유식 시작 시기 — 언제부터 어떻게 시작할까?</h1>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content">
<p>이유식은 아기의 첫 번째 음식 경험입니다. 모유나 분유만으로 필요한 영양을 모두 충족하던 아기가 다양한 식재료를 접하고, 씹고 삼키는 능력을 기르는 중요한 과정입니다. 이유식을 너무 일찍 시작하면 소화기관에 부담을 주고, 너무 늦게 시작하면 철분 부족과 식품 알레르기 위험이 높아집니다. 그렇다면 정확히 언제가 가장 좋은 시기일까요?</p>

<h2>이유식 시작 권장 시기</h2>
<p>세계보건기구(WHO), 대한소아과학회, 미국소아과학회(AAP) 모두 <strong>생후 만 6개월(180일 전후)</strong>을 이유식 시작 적정 시기로 권장합니다. 단, 개인차가 있어 생후 4~6개월 사이에 아기의 발달 준비도를 보고 판단하는 것이 중요합니다.</p>
<p>과거에는 4개월부터 시작하는 것을 권장하기도 했지만, 최신 지침은 6개월을 기준으로 하고 있습니다. 다만 모유수유 아기는 6개월 이후에도 철분이 점차 부족해질 수 있어 철분이 풍부한 첫 이유식 선택이 중요합니다.</p>

<h2>이유식 준비 완료를 알려주는 신호</h2>
<p>개월 수만으로 판단하기보다 아기가 보내는 신호를 함께 확인하는 것이 중요합니다. 다음 4가지 조건이 모두 충족되면 이유식을 시작할 준비가 된 것입니다.</p>

<div class="info-box">
<h3>✅ 이유식 준비 완료 체크리스트</h3>
<ul>
<li><strong>목을 잘 가눈다:</strong> 고개를 혼자 들고 유지할 수 있어야 합니다. 목 근육이 발달해야 음식을 삼킬 수 있습니다.</li>
<li><strong>도움을 받아 앉을 수 있다:</strong> 완전히 혼자 앉지 않아도 되지만, 등받이 지지를 받아 앉은 자세를 유지할 수 있어야 합니다.</li>
<li><strong>혀로 밀어내는 반사(설돌출반사)가 줄었다:</strong> 신생아는 입에 무언가 들어오면 혀로 밀어내는 반사가 있습니다. 이 반사가 약해져야 이유식을 삼킬 수 있습니다.</li>
<li><strong>어른 음식에 관심을 보인다:</strong> 부모가 먹는 것을 보며 군침을 흘리거나 손을 뻗으면 음식에 준비가 된 신호입니다.</li>
</ul>
</div>

<h2>이유식을 너무 일찍 시작하면 안 되는 이유</h2>
<p>생후 4개월 이전에 이유식을 시작하면 여러 문제가 생길 수 있습니다. 아기의 소화기관이 아직 고형 식품을 처리할 준비가 되어 있지 않아 소화 장애, 구토, 변비를 유발할 수 있습니다. 또한 신장이 미성숙해 이유식 재료의 염분과 단백질을 처리하는 데 부담을 줍니다. 너무 이른 이유식은 알레르기 발생 위험을 높인다는 연구도 있습니다. 무엇보다 설돌출반사가 남아있는 시기에 이유식을 주면 아기가 밀어내기 때문에 먹이는 것 자체가 힘듭니다.</p>

<h2>첫 이유식 재료 선택</h2>
<p>첫 이유식은 <strong>쌀미음</strong>이 가장 기본입니다. 쌀은 알레르기 반응이 극히 드물고, 소화가 잘 되며, 맛이 순해서 아기가 거부감 없이 접근할 수 있습니다. 쌀미음은 쌀 1 : 물 10의 비율로 완전히 걸쭉하게 끓인 후 완전히 갈아서 체에 거른 매끄러운 액체 형태로 시작합니다.</p>
<p>쌀미음에 익숙해지면(약 1~2주 후) 단호박, 애호박, 브로콜리, 당근 같은 채소 퓨레를 하나씩 추가합니다. 새 재료는 <strong>반드시 한 번에 하나씩, 최소 4일 간격</strong>을 두고 도입해야 알레르기 반응 확인이 가능합니다.</p>

<h2>초기 이유식 농도와 양</h2>
<p>처음에는 <strong>모유나 분유에 가까운 묽은 농도</strong>로 시작합니다. 수저로 떠서 천천히 흘러내릴 정도가 적당합니다. 양은 처음에 1~2 찻숟가락(5~10ml)으로 시작해 아기가 잘 받아들이면 조금씩 늘립니다.</p>
<p>초기 이유식 단계(생후 4~6개월)에는 하루 1회, 10분 이내로 진행합니다. 이유식은 수유 전에 주는 것이 좋습니다. 배가 덜 고파야 새로운 음식에 관심을 가질 수 있습니다. 아기가 이유식을 뱉거나 울면 강요하지 말고 그날은 중단합니다.</p>

<h2>이유식 시작 시 흔히 하는 실수</h2>
<p><strong>과일 주스 먼저 주기:</strong> 과일 주스는 단맛이 강해 아기가 다른 채소와 담백한 재료를 거부할 수 있습니다. 첫 이유식으로 적합하지 않습니다.</p>
<p><strong>소금, 설탕, 간장 첨가:</strong> 이유식에는 1세까지 간을 하지 않는 것이 원칙입니다. 신장이 아직 염분 처리 능력이 부족합니다.</p>
<p><strong>꿀 주기:</strong> 만 1세 미만 아기에게 꿀은 절대 금지입니다. 보툴리누스균 감염 위험이 있습니다.</p>
<p><strong>너무 빨리 덩어리 형태로 올리기:</strong> 아기의 씹는 능력 발달을 확인하면서 천천히 단계를 올려야 합니다. 너무 빨리 올리면 구역질과 음식 거부로 이어질 수 있습니다.</p>

<h2>이유식 도구 준비</h2>
<p>이유식을 시작하기 전 필요한 도구를 미리 준비합니다. 아기 전용 그릇과 숟가락(실리콘 재질 권장), 이유식 의자 또는 바운서, 앞치마(턱받이), 이유식 믹서 또는 핸드블렌더, 이유식 냉동 보관 용기가 필요합니다. 이유식용 숟가락은 얕고 작은 것을 선택해 아기 입 크기에 맞게 합니다.</p>

<div class="faq-section">
<details class="faq-item"><summary>이유식을 거부하면 어떻게 해야 하나요?</summary><div class="faq-answer"><p>이유식 거부는 매우 흔합니다. 강요하지 말고 2~3일 후 다시 시도하세요. 시간대를 바꾸거나(아기가 가장 기분 좋을 때), 온도를 조절하거나, 다른 재료로 바꿔보는 것도 방법입니다. 보통 10~15번 노출 후 받아들이는 경우가 많습니다.</p></div></details>
<details class="faq-item"><summary>모유수유 중에도 이유식을 시작해야 하나요?</summary><div class="faq-answer"><p>네, 모유수유 중에도 6개월이 되면 이유식을 시작해야 합니다. 모유만으로는 이 시기에 필요한 철분과 아연을 충분히 공급하기 어렵습니다. 이유식이 모유를 완전히 대체하지는 않으며, 돌까지 모유수유를 병행하는 것이 좋습니다.</p></div></details>
<details class="faq-item"><summary>이유식 시작 후 변 색깔이 달라졌어요, 정상인가요?</summary><div class="faq-answer"><p>정상입니다. 이유식을 시작하면 변의 색, 냄새, 질감이 변합니다. 당근을 먹으면 주황빛, 완두콩을 먹으면 녹색빛 변이 나올 수 있습니다. 변에 붉은 피나 하얀 점액이 섞이거나 설사가 심하면 소아과 상담이 필요합니다.</p></div></details>
</div>
