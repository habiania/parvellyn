<h1>예방접종 후 이상반응 대처법 — 발열·붓기·발진</h1>
</header>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<div class="post-content"><p>예방접종은 아기를 전염성 질환으로부터 보호하는 가장 효과적인 방법입니다. 하지만 접종 후 일부 아기에게 이상반응이 나타날 수 있습니다. 대부분의 이상반응은 가볍고 며칠 내에 자연 회복되지만, 드물게 즉각 의료 처치가 필요한 심각한 반응이 나타나는 경우도 있습니다.</p>
<h2>흔한 이상반응 (정상 반응)</h2>
<h3>발열</h3>
<p>예방접종 후 24~48시간 내에 발열이 나타날 수 있습니다. 이는 몸의 면역 반응이 활성화되는 정상적인 신호입니다. 38.5°C 이상이면 해열제(아세트아미노펜 계열)를 사용합니다. 열이 48시간 이상 지속되거나 39.5°C를 넘으면 소아과 진료를 받으세요.</p>
<h3>주사 부위 이상반응</h3>
<p>접종 부위가 빨갛게 부어오르고 만지면 아플 수 있습니다. 이는 매우 흔한 정상 반응으로 1~3일 내에 가라앉습니다. 부위에 찬 수건을 대어 주거나 그냥 두어도 됩니다. 붓기가 손바닥만큼 크거나 3일 이상 지속되면 의사에게 알리세요.</p>
<h3>칭얼거림·보챔</h3>
<p>접종 후 아기가 평소보다 많이 울거나 보챌 수 있습니다. 통증과 불편함 때문이며 대부분 하루 정도 지나면 나아집니다. 편안하게 안아주고, 필요하면 해열진통제를 사용할 수 있습니다.</p>
<h3>발진</h3>
<p>MMR(홍역·볼거리·풍진) 접종 후 7~14일 사이에 가벼운 발진이 나타날 수 있습니다. 이는 약독화된 바이러스에 대한 면역 반응입니다. 발진이 전신에 퍼지거나 가렵지 않으면 대기하면 됩니다.</p>
<div class="ad-slot ad-slot-banner">광고 영역</div>
<h2>즉시 응급실에 가야 할 심각한 반응</h2>
<div class="info-box" style="background:#fff3f3;border-left:4px solid #e74c3c;padding:1rem 1.2rem;border-radius:0 8px 8px 0;margin:1.5rem 0;">
<h3 style="color:#e74c3c;">⚠️ 아나필락시스 증상 — 즉시 119 신고</h3>
<ul>
<li>접종 후 15~30분 내 호흡 곤란</li>
<li>얼굴·목이 부어오름</li>
<li>온몸에 두드러기</li>
<li>의식 저하·창백함</li>
<li>심한 구토·설사</li>
</ul>
</div>
<h2>접종 후 관찰 요령</h2>
<p>접종 후에는 의원에서 <strong>15~30분간 대기</strong>하여 즉각적인 반응을 관찰합니다. 집에 돌아온 후에도 24시간 동안 아기 상태를 주의 깊게 살핍니다. 가능하면 접종 당일 목욕은 간단히 하거나 다음 날로 미룹니다. 활발한 야외 활동은 접종 후 1~2일은 자제하는 것이 좋습니다.</p>
<h2>접종 전 알려야 할 사항</h2>
<p>이전 예방접종에서 심한 반응이 있었다면 반드시 의사에게 알립니다. 현재 열이 있거나 아픈 경우, 면역 억제 치료를 받고 있는 경우, 계란 알레르기가 있는 경우(일부 백신에 계란 성분 포함)도 접종 전에 의사와 상담이 필요합니다.</p>

<h2>예방접종 종류별 이상반응 특징</h2>
<p>각 백신마다 나타나기 쉬운 이상반응이 다릅니다. 미리 알아두면 당황하지 않고 대처할 수 있습니다.</p>
<p><strong>DTaP(디프테리아·파상풍·백일해):</strong> 접종 부위 발적·부종이 가장 흔합니다. 3~4차 접종 후 발적 범위가 커질 수 있습니다. 접종 당일~2일 내 발열도 흔합니다.</p>
<p><strong>MMR(홍역·유행성이하선염·풍진):</strong> 접종 후 7~12일에 미열과 발진이 나타날 수 있습니다. 이는 생백신의 정상 면역 반응입니다. 실제 홍역과 달리 전파력은 없습니다.</p>
<p><strong>수두 백신:</strong> 접종 후 3~4주에 수포성 발진이 소수 생길 수 있습니다. 자연 감염보다 훨씬 약하고 대부분 5개 미만입니다.</p>
<p><strong>인플루엔자:</strong> 접종 부위 통증이 흔합니다. 주사형은 독감과 달리 감기 증상을 유발하지 않습니다.</p>
<h2>해열제 사용 시점과 종류</h2>
<p>예방접종 후 발열(38°C 이상)이 있으면 아세트아미노펜(타이레놀) 계열 해열제를 사용합니다. 이부프로펜(부루펜)은 생후 6개월 이후부터 사용 가능합니다. 아스피린은 영아와 소아에게 절대 사용하지 않습니다(라이 증후군 위험). 예방적으로 접종 전에 미리 해열제를 먹이는 것은 백신 면역 반응을 약화시킬 수 있어 권장되지 않습니다.
<div class="faq-section">
<details class="faq-item"><summary>접종 당일 목욕을 해도 되나요?</summary><div class="faq-answer"><p>접종 부위에 과도한 자극을 피하기 위해 당일 목욕은 간단히 하거나 내일로 미루는 것이 좋습니다. 주사 부위에 직접 물이 닿아도 큰 문제는 없지만 강하게 문지르지는 마세요.</p></div></details>
<details class="faq-item"><summary>접종 전에 해열제를 먹이면 이상반응이 줄어드나요?</summary><div class="faq-answer"><p>일부 연구에서 접종 전 예방적 해열제 사용이 백신 효과를 약간 낮출 수 있다는 결과가 있습니다. 열이 나기 전에 미리 먹이기보다는 이상반응이 생긴 후 사용하는 것이 일반적으로 권장됩니다.</p></div></details>
